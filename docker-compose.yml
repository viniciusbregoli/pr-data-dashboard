services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uv run --frozen uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/backend/app
    environment:
      WATCHFILES_FORCE_POLLING: "true"
    volumes:
      - ./backend:/app/backend
      - backend_venv:/app/backend/.venv
      - ./config.json:/app/config.json:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    restart: unless-stopped

volumes:
  backend_venv:
  frontend_node_modules:
